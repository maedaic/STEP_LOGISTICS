<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STEP Studio — Logistics</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav class="side-nav">
    <div class="side-brand">STEP <span>Studio</span></div>

    <a class="side-item" href="../dashboard/index.html">
      <svg class="side-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 9l7-6 7 6"/><path d="M5 8v9h10V8"/></svg>
      Dashboard
    </a>
    <a class="side-item" href="../layout/html/index.html">
      <svg class="side-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="3" width="6" height="6"/><rect x="11" y="3" width="6" height="6"/><rect x="3" y="11" width="6" height="6"/><rect x="11" y="11" width="6" height="6"/></svg>
      Layout
    </a>
    <a class="side-item" href="../inventory/index.html">
      <svg class="side-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 7l7-4 7 4-7 4-7-4z"/><path d="M3 7v6l7 4 7-4V7"/></svg>
      Inventory
    </a>

    <div class="side-group">
      <div class="side-group-label">Logistics</div>
      <button class="side-item side-sub is-active">
        <svg class="side-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 9l7-6 7 6"/><path d="M5 8v9h10V8"/></svg>
        Home
      </button>
      <a class="side-item side-sub" href="loading.html" title="積載プランナーを開く">
        <svg class="side-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="2" y="9" width="9" height="6" rx="1"/><path d="M11 11h4l3 3v1h-7z"/><circle cx="6" cy="16.5" r="1.3"/><circle cx="15" cy="16.5" r="1.3"/></svg>
        積載
      </a>
      <a class="side-item side-sub is-disabled" title="準備中">
        <svg class="side-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 7h11M14 7l-3-3M14 7l-3 3"/></svg>
        配送
      </a>
      <a class="side-item side-sub is-disabled" title="準備中">
        <svg class="side-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="6" cy="15" r="2"/><circle cx="15" cy="15" r="2"/><path d="M3 15V6h9l4 4v5"/></svg>
        配車
      </a>
    </div>

    <a class="side-item" href="../operations/index.html">
      <svg class="side-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="6" cy="6" r="2"/><circle cx="14" cy="6" r="2"/><circle cx="10" cy="15" r="2"/><path d="M6 8v3h8V8M10 11v2"/></svg>
      Operations
    </a>
    <a class="side-item" href="../analytics/index.html">
      <svg class="side-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 17V9M9 17V4M15 17v-6"/></svg>
      Analytics
    </a>
  </nav>

  <div class="app-content">
    <main class="home-main">
      <h1 class="home-title">Home</h1>
      <div class="home-grid">
        <div class="home-card home-card-wide">
          <h2>積載</h2>
          <div id="homeLoadingStatus" class="home-empty"></div>
          <p style="margin-top:12px;"><a class="btn btn-primary" href="loading.html">積載プランナーを開く</a></p>
        </div>

        <div class="home-card placeholder-card">
          <h2>今日配送<span class="placeholder-badge">準備中</span></h2>
          <div class="home-empty">複数配送案件を横断管理する機能はまだありません。</div>
        </div>
        <div class="home-card placeholder-card">
          <h2>積込待ち<span class="placeholder-badge">準備中</span></h2>
          <div class="home-empty">この機能はまだ実装されていません。</div>
        </div>
        <div class="home-card placeholder-card">
          <h2>トラック状況<span class="placeholder-badge">準備中</span></h2>
          <div class="home-empty">この機能はまだ実装されていません。</div>
        </div>
        <div class="home-card placeholder-card">
          <h2>ドライバー状況<span class="placeholder-badge">準備中</span></h2>
          <div class="home-empty">この機能はまだ実装されていません。</div>
        </div>
      </div>
    </main>
  </div>

  <script>
    // stepstudio_delivery_project は積載プランナー(loading.html)が使う唯一のセッション状態キー。
    // 複数案件の一覧管理は無いため、「保存済みプランの有無」だけを正直に示す。
    var saved = null;
    try { saved = localStorage.getItem('stepstudio_delivery_project'); } catch (_) { /* ignore */ }
    document.getElementById('homeLoadingStatus').textContent = saved
      ? '保存済みの積載プランがあります。'
      : 'まだ保存された積載プランはありません。';
  </script>
</body>
</html>
